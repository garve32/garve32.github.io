<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캐슬콤보 점수 계산기</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --line: #d6dcea;
      --text: #1b2333;
      --muted: #60708b;
      --primary: #2962f0;
      --danger: #e24a4a;
      --chip: #eef3ff;
      --shadow: 0 8px 24px rgba(27, 35, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .title {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
    }

    input[type="number"] {
      text-align: center;
      font-weight: 600;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .round-block + .round-block {
      margin-top: 14px;
    }

    .round-title {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .player-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .player-name {
      font-size: 15px;
      font-weight: 700;
    }

    .round-total-chip {
      font-size: 13px;
      background: var(--chip);
      border-radius: 99px;
      padding: 4px 8px;
      font-weight: 700;
      color: #24439a;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }

    .score-grid input {
      padding: 12px 4px;
      font-size: 18px;
    }

    .key-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
    }

    .key-row span {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }

    .summary-card h3 {
      margin: 0 0 4px;
      font-size: 15px;
    }

    .summary-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .summary-score {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 800;
    }

    @media (min-width: 680px) {
      body {
        padding: 18px;
      }

      .controls {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .player-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .player-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .summary {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">캐슬콤보 점수 계산기</h1>
    <p class="sub">3x3 카드칸 점수 + 열쇠(개당 1점)를 실시간 합산합니다.</p>

    <section class="panel controls">
      <div class="field">
        <label for="playerCount">인원수</label>
        <select id="playerCount">
          <option value="2" selected>2인</option>
          <option value="3">3인</option>
          <option value="4">4인</option>
        </select>
      </div>
      <div class="field">
        <label for="roundCount">라운드 수</label>
        <select id="roundCount">
          <option value="1">1라운드</option>
          <option value="2">2라운드</option>
          <option value="3" selected>3라운드</option>
        </select>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button id="resetBtn" type="button" class="btn-danger">전체 점수 초기화</button>
      </div>
    </section>

    <section id="roundContainer"></section>

    <section class="panel">
      <h2 style="margin:0 0 8px; font-size:18px;">최종 합계</h2>
      <div id="summary" class="summary"></div>
    </section>
  </div>

  <script>
    const state = {
      players: 2,
      rounds: 3
    };

    const playerCountEl = document.getElementById("playerCount");
    const roundCountEl = document.getElementById("roundCount");
    const resetBtn = document.getElementById("resetBtn");
    const roundContainerEl = document.getElementById("roundContainer");
    const summaryEl = document.getElementById("summary");

    function toScore(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return 0;
      return Math.floor(n);
    }

    function makeGridInput(round, player, cell) {
      const input = document.createElement("input");
      input.type = "number";
      input.id = `cell-r${round}-p${player}-c${cell}`;
      input.step = "1";
      input.value = "0";
      input.inputMode = "numeric";
      input.addEventListener("input", recalculate);
      return input;
    }

    function makeKeyInput(round, player) {
      const input = document.createElement("input");
      input.type = "number";
      input.id = `key-r${round}-p${player}`;
      input.step = "1";
      input.min = "0";
      input.value = "0";
      input.inputMode = "numeric";
      input.addEventListener("input", recalculate);
      return input;
    }

    function buildUI() {
      roundContainerEl.innerHTML = "";

      for (let r = 1; r <= state.rounds; r++) {
        const roundPanel = document.createElement("section");
        roundPanel.className = "panel round-block";

        const title = document.createElement("h2");
        title.className = "round-title";
        title.textContent = `${r}라운드`;
        roundPanel.appendChild(title);

        const playerGrid = document.createElement("div");
        playerGrid.className = "player-grid";

        for (let p = 1; p <= state.players; p++) {
          const card = document.createElement("article");
          card.className = "player-card";

          const header = document.createElement("div");
          header.className = "player-header";

          const name = document.createElement("div");
          name.className = "player-name";
          name.textContent = `${p}P`;

          const roundTotal = document.createElement("div");
          roundTotal.className = "round-total-chip";
          roundTotal.id = `round-total-r${r}-p${p}`;
          roundTotal.textContent = "합계 0";

          header.appendChild(name);
          header.appendChild(roundTotal);
          card.appendChild(header);

          const scoreGrid = document.createElement("div");
          scoreGrid.className = "score-grid";
          for (let c = 1; c <= 9; c++) {
            scoreGrid.appendChild(makeGridInput(r, p, c));
          }
          card.appendChild(scoreGrid);

          const keyRow = document.createElement("div");
          keyRow.className = "key-row";
          const keyLabel = document.createElement("span");
          keyLabel.textContent = "열쇠(+1점)";
          keyRow.appendChild(keyLabel);
          keyRow.appendChild(makeKeyInput(r, p));
          card.appendChild(keyRow);

          playerGrid.appendChild(card);
        }

        roundPanel.appendChild(playerGrid);
        roundContainerEl.appendChild(roundPanel);
      }

      recalculate();
    }

    function recalculate() {
      const totals = [];

      for (let p = 1; p <= state.players; p++) {
        let cardTotal = 0;
        let keyTotal = 0;

        for (let r = 1; r <= state.rounds; r++) {
          let roundCard = 0;
          for (let c = 1; c <= 9; c++) {
            const cellEl = document.getElementById(`cell-r${r}-p${p}-c${c}`);
            const cellScore = toScore(cellEl.value);
            cellEl.value = String(cellScore);
            roundCard += cellScore;
          }

          const keyEl = document.getElementById(`key-r${r}-p${p}`);
          const roundKey = Math.max(0, toScore(keyEl.value));
          keyEl.value = String(roundKey);

          cardTotal += roundCard;
          keyTotal += roundKey;

          const roundTotalEl = document.getElementById(`round-total-r${r}-p${p}`);
          roundTotalEl.textContent = `합계 ${roundCard + roundKey}`;
        }

        totals.push({
          player: p,
          card: cardTotal,
          key: keyTotal,
          final: cardTotal + keyTotal
        });
      }

      renderSummary(totals);
    }

    function renderSummary(totals) {
      summaryEl.innerHTML = "";
      const ranking = [...totals].sort((a, b) => b.final - a.final);

      ranking.forEach((item, index) => {
        const card = document.createElement("article");
        card.className = "summary-card";

        const title = document.createElement("h3");
        title.textContent = `${index + 1}위 · ${item.player}P`;
        card.appendChild(title);

        const detail = document.createElement("p");
        detail.textContent = `카드 ${item.card} / 열쇠 ${item.key}`;
        card.appendChild(detail);

        const score = document.createElement("div");
        score.className = "summary-score";
        score.textContent = `${item.final}점`;
        card.appendChild(score);

        summaryEl.appendChild(card);
      });
    }

    function resetScores() {
      const inputs = roundContainerEl.querySelectorAll('input[type="number"]');
      inputs.forEach((input) => {
        input.value = "0";
      });
      recalculate();
    }

    playerCountEl.addEventListener("change", () => {
      state.players = Number(playerCountEl.value) || 2;
      buildUI();
    });

    roundCountEl.addEventListener("change", () => {
      state.rounds = Number(roundCountEl.value) || 1;
      buildUI();
    });

    resetBtn.addEventListener("click", resetScores);

    buildUI();
  </script>
</body>
</html>
