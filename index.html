<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>캐슬콤보 점수 계산기</title>
    <style>
      :root {
        --bg: #f3f6fa;
        --card: #ffffff;
        --line: #d8e1eb;
        --text: #172033;
        --muted: #5e6d85;
        --primary: #2a62f2;
        --danger: #d84c57;
        --chip: #eef3ff;
        --shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
        --shadow-soft: 0 4px 12px rgba(17, 24, 39, 0.06);
      }

      body.theme-castle {
        --bg: #eff7f6;
        --card: #ffffff;
        --line: #c7dedd;
        --text: #113038;
        --muted: #47656f;
        --primary: #0f8f8f;
        --danger: #dd5b66;
        --chip: #e6f5f3;
        --shadow: 0 12px 26px rgba(15, 84, 86, 0.12);
        --shadow-soft: 0 4px 10px rgba(15, 84, 86, 0.08);
      }

      body.theme-lost {
        --bg: #f7f2e8;
        --card: #fffdf8;
        --line: #e4d5bb;
        --text: #3a2d1f;
        --muted: #7b6549;
        --primary: #c27a2c;
        --danger: #c55b4f;
        --chip: #fff3df;
        --shadow: 0 12px 26px rgba(102, 72, 32, 0.12);
        --shadow-soft: 0 4px 10px rgba(102, 72, 32, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          "Pretendard",
          "Noto Sans KR",
          "Segoe UI",
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 8px;
        transition:
          background 0.25s ease,
          color 0.25s ease;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }

      .title {
        margin: 0 0 4px;
        font-size: 24px;
      }

      .sub {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 10px;
        box-shadow: var(--shadow);
        margin-bottom: 6px;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        align-items: end;
        padding: 4px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      label {
        font-size: 11px;
        color: var(--muted);
      }

      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        font-size: 16px;
        background: color-mix(in srgb, var(--card) 92%, white 8%);
        color: var(--text);
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
      }

      input[type="number"] {
        text-align: center;
        font-weight: 600;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition:
          transform 0.12s ease,
          box-shadow 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      button:active {
        transform: translateY(1px);
      }

      .controls select,
      .controls button {
        height: 34px;
        padding: 4px 6px;
        font-size: 12px;
        border-radius: 10px;
      }

      .btn-danger {
        background: var(--danger);
        color: #fff;
        box-shadow: var(--shadow-soft);
      }

      .game-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 4px;
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--card) 90%, white 10%);
        color: var(--muted);
        height: 34px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 700;
        box-shadow: var(--shadow-soft);
      }

      .tab-btn.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
        box-shadow: 0 8px 18px color-mix(in srgb, var(--primary) 36%, transparent);
      }

      .game-page {
        display: none;
      }

      .game-page.active {
        display: block;
      }

      .lost-grid {
        display: grid;
        gap: 4px;
      }

      .lost-row {
        display: grid;
        grid-template-columns: 46px 60px minmax(116px, 1fr) 36px 56px;
        gap: 3px;
        align-items: center;
      }

      .lost-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-align: center;
      }

      .lost-row input {
        padding: 3px 4px;
        font-size: 16px;
      }

      .lost-sum-input {
        font-size: 16px;
        padding: 2px 4px;
      }

      .lost-wager-group {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2px;
        padding: 1px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8f9fd;
      }

      .lost-wager-btn {
        border: 0;
        border-radius: 6px;
        height: 24px;
        padding: 0;
        font-size: 12px;
        font-weight: 700;
        background: transparent;
        color: var(--muted);
      }

      .lost-wager-btn.active {
        background: var(--primary);
        color: #fff;
      }

      .lost-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .lost-toggle input {
        width: 15px;
        height: 15px;
        margin: 0;
      }

      .lost-exp-score {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f6f8fd;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
        padding: 4px 3px;
      }

      .lost-guide-row {
        display: grid;
        grid-template-columns: 46px 60px minmax(116px, 1fr) 36px 56px;
        gap: 3px;
        align-items: center;
        margin-bottom: 2px;
      }

      .lost-guide {
        font-size: 10px;
        font-weight: 700;
        color: var(--muted);
        text-align: center;
        line-height: 1.1;
      }

      .lost-bonus-inline,
      .key-inline {
        display: flex;
        align-items: center;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 6px;
        background: color-mix(in srgb, var(--card) 94%, white 6%);
      }

      .lost-bonus-inline span,
      .key-inline span {
        font-size: 11px;
        color: var(--muted);
        font-weight: 700;
        white-space: nowrap;
      }

      .lost-bonus-inline input,
      .key-inline input {
        width: 52px;
        min-width: 52px;
        padding: 3px 2px;
        font-size: 16px;
        border-radius: 6px;
      }

      .round-block + .round-block {
        margin-top: 14px;
      }

      .round-title {
        margin: 0;
        font-size: 16px;
        flex: 0 0 auto;
      }

      .round-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .round-meta {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        margin: 0;
        overflow-x: auto;
        white-space: nowrap;
      }

      .round-result-chip {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 700;
        background: var(--p-bg, #f4f7ff);
        border-color: var(--p-border, var(--line));
        color: var(--p-text, #3352a7);
      }

      .crown-slot {
        display: inline-block;
        width: 1.1em;
        text-align: center;
        line-height: 1;
        font-size: 12px;
      }

      .crown-slot.hidden {
        visibility: hidden;
      }

      .round-result-chip.win {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      }

      .round-result-chip.lose {
        opacity: 0.72;
      }

      .player-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .player-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px;
        background: #fff;
      }

      .player-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .player-name {
        font-size: 13px;
        font-weight: 800;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--p-border, var(--line));
        background: var(--p-bg, #f4f7ff);
        color: var(--p-strong, var(--text));
        line-height: 1;
      }

      .player-head-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* key-inline styles are shared with lost-bonus-inline above */

      .round-total-chip {
        font-size: 14px;
        background: var(--p-strong, #1d3f95);
        border-radius: 99px;
        padding: 5px 10px;
        font-weight: 800;
        color: var(--p-strong-text, #ffffff);
      }

      .player-theme-1 {
        --p-bg: #ffecee;
        --p-border: #ffb9c0;
        --p-text: #9e1f2f;
        --p-strong: #c52a3d;
        --p-strong-text: #ffffff;
      }

      .player-theme-2 {
        --p-bg: #e9f2ff;
        --p-border: #b9d3ff;
        --p-text: #1f56a8;
        --p-strong: #1f56a8;
        --p-strong-text: #ffffff;
      }

      .player-theme-3 {
        --p-bg: #fff4e7;
        --p-border: #ffd7a8;
        --p-text: #9a5a00;
        --p-strong: #b96b00;
        --p-strong-text: #ffffff;
      }

      .player-theme-4 {
        --p-bg: #f4ecff;
        --p-border: #d5c0ff;
        --p-text: #6941a3;
        --p-strong: #6941a3;
        --p-strong-text: #ffffff;
      }

      .score-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 8px;
      }

      .score-grid input {
        padding: 5px 3px;
        font-size: 16px;
      }

      /* CastleCombo only: keep 16px text, compress vertical spacing */
      #pageCastle .round-block + .round-block {
        margin-top: 10px;
      }

      #pageCastle .player-grid {
        gap: 7px;
      }

      #pageCastle .player-card {
        padding: 8px;
      }

      #pageCastle .player-header {
        margin-bottom: 6px;
      }

      #pageCastle .score-grid {
        gap: 4px;
        margin-bottom: 6px;
      }

      #pageCastle .score-grid input {
        padding: 3px 2px;
        font-size: 16px;
      }

      @media (min-width: 680px) {
        body {
          padding: 18px;
        }

        .controls {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 420px) {
        .controls {
          row-gap: 4px;
          column-gap: 5px;
        }

        .lost-row {
          grid-template-columns: 40px 52px minmax(96px, 1fr) 30px 50px;
        }

        .lost-guide-row {
          grid-template-columns: 40px 52px minmax(96px, 1fr) 30px 50px;
        }
      }

      /* Tablet (iPad) optimization */
      @media (min-width: 768px) and (max-width: 1199px) {
        body {
          padding: 12px;
        }

        .wrap {
          max-width: 1024px;
        }

        .panel {
          padding: 10px;
        }

        .player-grid {
          gap: 8px;
        }

        .round-meta {
          gap: 7px;
        }

        .lost-row {
          grid-template-columns: 46px 62px minmax(124px, 1fr) 36px 60px;
        }

        .lost-guide-row {
          grid-template-columns: 46px 62px minmax(124px, 1fr) 36px 60px;
        }
      }

      @media (min-width: 1200px) {
        body {
          padding: 20px;
        }

        .wrap {
          max-width: 1320px;
        }

        .panel {
          padding: 12px;
          margin-bottom: 10px;
        }

        .controls {
          gap: 8px;
          padding: 6px;
        }

        .controls select,
        .controls button {
          height: 36px;
          font-size: 13px;
        }

        .round-meta {
          gap: 8px;
        }

        .player-grid {
          gap: 10px;
        }
      }

      @media (min-width: 1600px) {
        .wrap {
          max-width: 1480px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="panel game-tabs">
        <button id="tabCastle" type="button" class="tab-btn active">
          캐슬콤보
        </button>
        <button id="tabLostCity" type="button" class="tab-btn">
          로스트시티
        </button>
      </section>

      <section id="pageCastle" class="game-page active">
        <section class="panel controls">
          <div class="field">
            <label for="playerCount">인원수</label>
            <select id="playerCount">
              <option value="2" selected>2인</option>
              <option value="3">3인</option>
              <option value="4">4인</option>
            </select>
          </div>
          <div class="field">
            <label for="roundCount">라운드 수</label>
            <select id="roundCount">
              <option value="1" selected>1라운드</option>
              <option value="2">2라운드</option>
              <option value="3">3라운드</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="resetBtn" type="button" class="btn-danger">
              전체 점수 초기화
            </button>
          </div>
        </section>

        <section id="roundContainer"></section>
      </section>

      <section id="pageLostCity" class="game-page">
        <section class="panel controls">
          <div class="field">
            <label for="lostPlayerCount">인원수</label>
            <select id="lostPlayerCount">
              <option value="2" selected>2인</option>
              <option value="3">3인</option>
              <option value="4">4인</option>
            </select>
          </div>
          <div class="field">
            <label for="lostRoundCount">라운드 수</label>
            <select id="lostRoundCount">
              <option value="1" selected>1라운드</option>
              <option value="2">2라운드</option>
              <option value="3">3라운드</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="lostResetBtn" type="button" class="btn-danger">
              전체 점수 초기화
            </button>
          </div>
        </section>

        <section id="lostRoundContainer"></section>
      </section>
    </div>

    <script>
      const state = {
        players: 2,
        rounds: 1,
        lostPlayers: 2,
        lostRounds: 1,
      };

      const playerCountEl = document.getElementById("playerCount");
      const roundCountEl = document.getElementById("roundCount");
      const resetBtn = document.getElementById("resetBtn");
      const roundContainerEl = document.getElementById("roundContainer");
      const tabCastleEl = document.getElementById("tabCastle");
      const tabLostCityEl = document.getElementById("tabLostCity");
      const pageCastleEl = document.getElementById("pageCastle");
      const pageLostCityEl = document.getElementById("pageLostCity");
      const lostPlayerCountEl = document.getElementById("lostPlayerCount");
      const lostRoundCountEl = document.getElementById("lostRoundCount");
      const lostResetBtnEl = document.getElementById("lostResetBtn");
      const lostRoundContainerEl =
        document.getElementById("lostRoundContainer");

      function toScore(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return 0;
        return Math.floor(n);
      }

      function makeGridInput(round, player, cell) {
        const input = document.createElement("input");
        input.type = "number";
        input.id = `cell-r${round}-p${player}-c${cell}`;
        input.step = "1";
        input.value = "0";
        input.inputMode = "numeric";
        bindSelectAll(input);
        input.addEventListener("input", recalculate);
        return input;
      }

      function makeKeyInput(round, player) {
        const input = document.createElement("input");
        input.type = "number";
        input.id = `key-r${round}-p${player}`;
        input.step = "1";
        input.min = "0";
        input.value = "0";
        input.inputMode = "numeric";
        bindSelectAll(input);
        input.addEventListener("input", recalculate);
        return input;
      }

      const LOST_EXPEDITIONS = [
        { key: "z1", label: "1구역" },
        { key: "z2", label: "2구역" },
        { key: "z3", label: "3구역" },
        { key: "z4", label: "4구역" },
        { key: "z5", label: "5구역" },
      ];

      function makeLostInput(id, min, max) {
        const input = document.createElement("input");
        input.type = "number";
        input.id = id;
        input.step = "1";
        if (min !== undefined) input.min = String(min);
        if (max !== undefined) input.max = String(max);
        input.value = "0";
        input.inputMode = "numeric";
        bindSelectAll(input);
        input.addEventListener("input", recalculateLost);
        return input;
      }

      function makeLostWagerButtons(id) {
        const wrap = document.createElement("div");
        wrap.className = "lost-wager-group";

        [0, 1, 2, 3].forEach((n) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `lost-wager-btn${n === 0 ? " active" : ""}`;
          btn.dataset.value = String(n);
          btn.textContent = String(n);
          btn.addEventListener("click", () => {
            setLostWagerValue(id, n);
          });
          wrap.appendChild(btn);
        });

        const hidden = document.createElement("input");
        hidden.type = "hidden";
        hidden.id = id;
        hidden.value = "0";
        wrap.appendChild(hidden);

        return wrap;
      }

      function syncLostWagerButtons(id) {
        const hidden = document.getElementById(id);
        if (!hidden) return;
        const value = Math.min(3, Math.max(0, toScore(hidden.value)));
        hidden.value = String(value);
        const wrap = hidden.parentElement;
        if (!wrap) return;
        const buttons = wrap.querySelectorAll(".lost-wager-btn");
        buttons.forEach((btn) => {
          btn.classList.toggle("active", toScore(btn.dataset.value) === value);
        });
      }

      function setLostWagerValue(id, value) {
        const hidden = document.getElementById(id);
        if (!hidden) return;
        hidden.value = String(value);
        syncLostWagerButtons(id);
        recalculateLost();
      }

      function makeLostBonusToggle(id) {
        const wrap = document.createElement("label");
        wrap.className = "lost-toggle";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = id;
        checkbox.addEventListener("change", recalculateLost);

        wrap.appendChild(checkbox);
        return wrap;
      }

      function bindSelectAll(input) {
        const selectAll = () => {
          if (typeof input.select === "function") {
            input.select();
          }
        };

        input.addEventListener("focus", () => {
          requestAnimationFrame(selectAll);
        });

        input.addEventListener("mouseup", (event) => {
          event.preventDefault();
          selectAll();
        });
      }

      function getResponsiveMaxColumns() {
        const width = window.innerWidth || document.documentElement.clientWidth;
        if (width >= 1400) return 4;
        if (width >= 768) return 2;
        return 1;
      }

      function applyResponsiveGridColumns(gridEl, playerCount) {
        const cols = Math.min(playerCount, getResponsiveMaxColumns());
        gridEl.style.gridTemplateColumns = `repeat(${Math.max(1, cols)}, minmax(0, 1fr))`;
      }

      function buildUI() {
        roundContainerEl.innerHTML = "";

        for (let r = 1; r <= state.rounds; r++) {
          const roundPanel = document.createElement("section");
          roundPanel.className = "panel round-block";

          const roundHead = document.createElement("div");
          roundHead.className = "round-head";

          const title = document.createElement("h2");
          title.className = "round-title";
          title.textContent = `${r}R`;
          roundHead.appendChild(title);

          const roundMeta = document.createElement("div");
          roundMeta.className = "round-meta";
          roundMeta.id = `round-meta-r${r}`;
          roundHead.appendChild(roundMeta);
          roundPanel.appendChild(roundHead);

          const playerGrid = document.createElement("div");
          playerGrid.className = "player-grid";
          applyResponsiveGridColumns(playerGrid, state.players);

          for (let p = 1; p <= state.players; p++) {
            const card = document.createElement("article");
            card.className = "player-card";

            const header = document.createElement("div");
            header.className = "player-header";

            const name = document.createElement("div");
            name.className = `player-name player-theme-${p}`;
            name.textContent = `${p}P`;

            const headRight = document.createElement("div");
            headRight.className = "player-head-right";

            const keyInline = document.createElement("div");
            keyInline.className = "key-inline";
            keyInline.classList.add(`player-theme-${p}`);
            const keyLabel = document.createElement("span");
            keyLabel.textContent = "🔑";
            keyInline.appendChild(keyLabel);
            keyInline.appendChild(makeKeyInput(r, p));

            const roundTotal = document.createElement("div");
            roundTotal.className = `round-total-chip player-theme-${p}`;
            roundTotal.id = `round-total-r${r}-p${p}`;
            roundTotal.textContent = "합계 0점";

            headRight.appendChild(keyInline);
            headRight.appendChild(roundTotal);
            header.appendChild(name);
            header.appendChild(headRight);
            card.appendChild(header);

            const scoreGrid = document.createElement("div");
            scoreGrid.className = "score-grid";
            for (let c = 1; c <= 9; c++) {
              scoreGrid.appendChild(makeGridInput(r, p, c));
            }
            card.appendChild(scoreGrid);

            playerGrid.appendChild(card);
          }

          roundPanel.appendChild(playerGrid);
          roundContainerEl.appendChild(roundPanel);
        }

        recalculate();
      }

      function recalculate() {
        const roundScores = [];

        for (let r = 1; r <= state.rounds; r++) {
          const entries = [];

          for (let p = 1; p <= state.players; p++) {
            let roundCard = 0;
            for (let c = 1; c <= 9; c++) {
              const cellEl = document.getElementById(`cell-r${r}-p${p}-c${c}`);
              const cellScore = toScore(cellEl.value);
              cellEl.value = String(cellScore);
              roundCard += cellScore;
            }

            const keyEl = document.getElementById(`key-r${r}-p${p}`);
            const roundKey = Math.max(0, toScore(keyEl.value));
            keyEl.value = String(roundKey);

            const roundFinal = roundCard + roundKey;

            const roundTotalEl = document.getElementById(
              `round-total-r${r}-p${p}`,
            );
            roundTotalEl.textContent = `합계 ${roundFinal}점`;

            entries.push({ player: p, score: roundFinal });
          }

          roundScores.push({ round: r, entries });
        }

        renderRoundResults(roundScores, "round-meta-r");
      }

      function renderRoundResults(roundScores, metaPrefix) {
        roundScores.forEach(({ round, entries }) => {
          const metaEl = document.getElementById(`${metaPrefix}${round}`);
          metaEl.innerHTML = "";

          const maxScore = Math.max(...entries.map((entry) => entry.score));

          entries.forEach((entry) => {
            const chip = document.createElement("span");
            const isWin = entry.score === maxScore;
            chip.className = `round-result-chip player-theme-${entry.player} ${isWin ? "win" : "lose"}`;

            const scoreText = document.createElement("span");
            scoreText.textContent = `${entry.player}P ${entry.score}점`;

            const crown = document.createElement("span");
            crown.className = `crown-slot${isWin ? "" : " hidden"}`;
            crown.textContent = "👑";

            chip.appendChild(scoreText);
            chip.appendChild(crown);
            metaEl.appendChild(chip);
          });
        });
      }

      function buildLostUI() {
        lostRoundContainerEl.innerHTML = "";

        for (let r = 1; r <= state.lostRounds; r++) {
          const roundPanel = document.createElement("section");
          roundPanel.className = "panel round-block";

          const roundHead = document.createElement("div");
          roundHead.className = "round-head";

          const title = document.createElement("h2");
          title.className = "round-title";
          title.textContent = `${r}R`;
          roundHead.appendChild(title);

          const roundMeta = document.createElement("div");
          roundMeta.className = "round-meta";
          roundMeta.id = `lost-round-meta-r${r}`;
          roundHead.appendChild(roundMeta);
          roundPanel.appendChild(roundHead);

          const playerGrid = document.createElement("div");
          playerGrid.className = "player-grid";
          applyResponsiveGridColumns(playerGrid, state.lostPlayers);

          for (let p = 1; p <= state.lostPlayers; p++) {
            const card = document.createElement("article");
            card.className = "player-card";

            const header = document.createElement("div");
            header.className = "player-header";

            const name = document.createElement("div");
            name.className = `player-name player-theme-${p}`;
            name.textContent = `${p}P`;

            const headRight = document.createElement("div");
            headRight.className = "player-head-right";

            const bonusInline = document.createElement("div");
            bonusInline.className = "lost-bonus-inline";
            bonusInline.classList.add(`player-theme-${p}`);
            const bonusLabel = document.createElement("span");
            bonusLabel.textContent = "⭐";
            bonusInline.appendChild(bonusLabel);
            bonusInline.appendChild(
              makeLostInput(`lost-bonus-r${r}-p${p}`, 0, undefined),
            );

            const roundTotal = document.createElement("div");
            roundTotal.className = `round-total-chip player-theme-${p}`;
            roundTotal.id = `lost-total-r${r}-p${p}`;
            roundTotal.textContent = "합계 0점";

            header.appendChild(name);
            headRight.appendChild(bonusInline);
            headRight.appendChild(roundTotal);
            header.appendChild(headRight);
            card.appendChild(header);

            const grid = document.createElement("div");
            grid.className = "lost-grid";

            const guideRow = document.createElement("div");
            guideRow.className = "lost-guide-row";

            const g0 = document.createElement("div");
            g0.className = "lost-guide";
            g0.textContent = "";
            const g1 = document.createElement("div");
            g1.className = "lost-guide";
            g1.textContent = "점수합";
            const g2 = document.createElement("div");
            g2.className = "lost-guide";
            g2.textContent = "x2투자";
            const g3 = document.createElement("div");
            g3.className = "lost-guide";
            g3.textContent = "8장+";
            const g4 = document.createElement("div");
            g4.className = "lost-guide";
            g4.textContent = "구역합";

            guideRow.appendChild(g0);
            guideRow.appendChild(g1);
            guideRow.appendChild(g2);
            guideRow.appendChild(g3);
            guideRow.appendChild(g4);
            grid.appendChild(guideRow);

            LOST_EXPEDITIONS.forEach((exp, idx) => {
              const row = document.createElement("div");
              row.className = "lost-row";

              const label = document.createElement("div");
              label.className = "lost-label";
              label.textContent = exp.label;

              const sumInput = makeLostInput(
                `lost-sum-r${r}-p${p}-e${idx}`,
                0,
                undefined,
              );
              sumInput.classList.add("lost-sum-input");
              sumInput.placeholder = "숫자합";

              const wagerInput = makeLostWagerButtons(
                `lost-w-r${r}-p${p}-e${idx}`,
              );
              const bonusToggle = makeLostBonusToggle(
                `lost-b-r${r}-p${p}-e${idx}`,
              );

              const expScore = document.createElement("div");
              expScore.className = "lost-exp-score";
              expScore.id = `lost-exp-score-r${r}-p${p}-e${idx}`;
              expScore.textContent = "0";

              row.appendChild(label);
              row.appendChild(sumInput);
              row.appendChild(wagerInput);
              row.appendChild(bonusToggle);
              row.appendChild(expScore);
              grid.appendChild(row);
            });

            card.appendChild(grid);
            playerGrid.appendChild(card);
          }

          roundPanel.appendChild(playerGrid);
          lostRoundContainerEl.appendChild(roundPanel);
        }

        recalculateLost();
      }

      function recalculateLost() {
        const roundScores = [];

        for (let r = 1; r <= state.lostRounds; r++) {
          const entries = [];

          for (let p = 1; p <= state.lostPlayers; p++) {
            let total = 0;
            const bonusScoreEl = document.getElementById(
              `lost-bonus-r${r}-p${p}`,
            );
            const bonus = Math.max(0, toScore(bonusScoreEl.value));
            bonusScoreEl.value = String(bonus);

            LOST_EXPEDITIONS.forEach((_, idx) => {
              const sumEl = document.getElementById(
                `lost-sum-r${r}-p${p}-e${idx}`,
              );
              const wagerEl = document.getElementById(
                `lost-w-r${r}-p${p}-e${idx}`,
              );
              const bonusEl = document.getElementById(
                `lost-b-r${r}-p${p}-e${idx}`,
              );
              const expScoreEl = document.getElementById(
                `lost-exp-score-r${r}-p${p}-e${idx}`,
              );

              const sum = Math.max(0, toScore(sumEl.value));
              const wager = Math.min(3, Math.max(0, toScore(wagerEl.value)));
              const hasBonus = Boolean(bonusEl.checked);

              sumEl.value = String(sum);
              wagerEl.value = String(wager);

              let expeditionScore = 0;
              if (sum > 0 || wager > 0 || hasBonus) {
                expeditionScore = (sum - 20) * (wager + 1);
                if (hasBonus) {
                  expeditionScore += 20;
                }
              }

              expScoreEl.textContent = String(expeditionScore);
              total += expeditionScore;
            });

            const totalEl = document.getElementById(`lost-total-r${r}-p${p}`);
            total += bonus;
            totalEl.textContent = `합계 ${total}점`;
            entries.push({ player: p, score: total });
          }

          roundScores.push({ round: r, entries });
        }

        renderRoundResults(roundScores, "lost-round-meta-r");
      }

      function resetScores() {
        const inputs = roundContainerEl.querySelectorAll(
          'input[type="number"]',
        );
        inputs.forEach((input) => {
          input.value = "0";
        });
        recalculate();
      }

      function resetLostScores() {
        const numberInputs = lostRoundContainerEl.querySelectorAll(
          'input[type="number"]',
        );
        numberInputs.forEach((input) => {
          input.value = "0";
        });

        const wagerHiddenInputs = lostRoundContainerEl.querySelectorAll(
          'input[type="hidden"][id^="lost-w-"]',
        );
        wagerHiddenInputs.forEach((hidden) => {
          hidden.value = "0";
          syncLostWagerButtons(hidden.id);
        });

        const checks = lostRoundContainerEl.querySelectorAll(
          'input[type="checkbox"]',
        );
        checks.forEach((check) => {
          check.checked = false;
        });

        recalculateLost();
      }

      playerCountEl.addEventListener("change", () => {
        state.players = Number(playerCountEl.value) || 2;
        buildUI();
      });

      roundCountEl.addEventListener("change", () => {
        state.rounds = Number(roundCountEl.value) || 1;
        buildUI();
      });

      resetBtn.addEventListener("click", resetScores);

      lostPlayerCountEl.addEventListener("change", () => {
        state.lostPlayers = Number(lostPlayerCountEl.value) || 2;
        buildLostUI();
      });

      lostRoundCountEl.addEventListener("change", () => {
        state.lostRounds = Number(lostRoundCountEl.value) || 3;
        buildLostUI();
      });

      lostResetBtnEl.addEventListener("click", resetLostScores);

      function setActiveGame(gameKey) {
        const isCastle = gameKey === "castle";
        tabCastleEl.classList.toggle("active", isCastle);
        tabLostCityEl.classList.toggle("active", !isCastle);
        pageCastleEl.classList.toggle("active", isCastle);
        pageLostCityEl.classList.toggle("active", !isCastle);
        document.body.classList.toggle("theme-castle", isCastle);
        document.body.classList.toggle("theme-lost", !isCastle);
      }

      tabCastleEl.addEventListener("click", () => {
        setActiveGame("castle");
      });

      tabLostCityEl.addEventListener("click", () => {
        setActiveGame("lostcity");
      });

      window.addEventListener("resize", () => {
        document.querySelectorAll("#pageCastle .player-grid").forEach((grid) => {
          applyResponsiveGridColumns(grid, state.players);
        });
        document.querySelectorAll("#pageLostCity .player-grid").forEach((grid) => {
          applyResponsiveGridColumns(grid, state.lostPlayers);
        });
      });

      setActiveGame("castle");
      buildUI();
      buildLostUI();
    </script>
  </body>
</html>
