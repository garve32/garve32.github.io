<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>보드게임 점수 계산기</title>
    <style>
      :root {
        --bg: #f3f6fa;
        --card: #ffffff;
        --line: #d8e1eb;
        --text: #172033;
        --muted: #5e6d85;
        --primary: #2a62f2;
        --danger: #d84c57;
        --chip: #eef3ff;
        --shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
        --shadow-soft: 0 4px 12px rgba(17, 24, 39, 0.06);
      }

      body.theme-castle {
        --bg: #f4efe6;
        --card: #fffdf8;
        --line: #d9ccb7;
        --text: #2f2418;
        --muted: #6d5b46;
        --primary: #7c4d2f;
        --danger: #b44b42;
        --chip: #f2e6d3;
        --shadow: 0 12px 26px rgba(92, 67, 40, 0.14);
        --shadow-soft: 0 4px 10px rgba(92, 67, 40, 0.09);
      }

      body.theme-lost {
        --bg: #f2ecdf;
        --card: #fffbf3;
        --line: #decfb3;
        --text: #352a1e;
        --muted: #75624a;
        --primary: #2d6f9f;
        --danger: #c15445;
        --chip: #f8eedb;
        --shadow: 0 12px 26px rgba(86, 66, 39, 0.13);
        --shadow-soft: 0 4px 10px rgba(86, 66, 39, 0.08);
      }

      body.theme-harmonies {
        --bg: #edf7f2;
        --card: #fbfffd;
        --line: #c8e0d3;
        --text: #17382d;
        --muted: #587a6b;
        --primary: #2f9d7e;
        --danger: #c45e4f;
        --chip: #e6f5ee;
        --shadow: 0 12px 26px rgba(32, 107, 83, 0.13);
        --shadow-soft: 0 4px 10px rgba(32, 107, 83, 0.08);
      }

      body.theme-century {
        --bg: #f4f0fa;
        --card: #fefcff;
        --line: #dccfee;
        --text: #2f2442;
        --muted: #6f618b;
        --primary: #5a4fcf;
        --danger: #c3567d;
        --chip: #efe8fb;
        --shadow: 0 12px 26px rgba(75, 58, 126, 0.15);
        --shadow-soft: 0 4px 10px rgba(75, 58, 126, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          "Pretendard", "Noto Sans KR", "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 8px;
        transition:
          background 0.25s ease,
          color 0.25s ease;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }

      .title {
        margin: 0 0 4px;
        font-size: 24px;
      }

      .sub {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 10px;
        box-shadow: var(--shadow);
        margin-bottom: 6px;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        align-items: end;
        padding: 4px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      label {
        font-size: 11px;
        color: var(--muted);
      }

      select,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        font-size: 16px;
        background: color-mix(in srgb, var(--card) 92%, white 8%);
        color: var(--text);
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px
          color-mix(in srgb, var(--primary) 18%, transparent);
      }

      input[type="number"] {
        text-align: center;
        font-weight: 600;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 11px 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition:
          transform 0.12s ease,
          box-shadow 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      button:active {
        transform: translateY(1px);
      }

      .controls select,
      .controls button {
        height: 34px;
        padding: 4px 6px;
        font-size: 12px;
        border-radius: 10px;
      }

      .btn-danger {
        background: var(--danger);
        color: #fff;
        box-shadow: var(--shadow-soft);
      }

      .game-tabs {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        padding: 4px;
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--card) 90%, white 10%);
        color: var(--muted);
        height: 34px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 700;
        box-shadow: var(--shadow-soft);
      }

      .tab-btn.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
        box-shadow: 0 8px 18px
          color-mix(in srgb, var(--primary) 36%, transparent);
      }

      .game-page {
        display: none;
      }

      .game-page.active {
        display: block;
      }

      .lost-grid {
        display: grid;
        gap: 4px;
      }

      .lost-row {
        display: grid;
        grid-template-columns: 46px 60px minmax(116px, 1fr) 36px 56px;
        gap: 3px;
        align-items: center;
      }

      .lost-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-align: center;
      }

      .lost-row input {
        padding: 3px 4px;
        font-size: 16px;
      }

      .lost-sum-input {
        font-size: 16px;
        padding: 2px 4px;
      }

      .lost-wager-group {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2px;
        padding: 1px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8f9fd;
      }

      .lost-wager-btn {
        border: 0;
        border-radius: 6px;
        height: 24px;
        padding: 0;
        font-size: 12px;
        font-weight: 700;
        background: transparent;
        color: var(--muted);
      }

      .lost-wager-btn.active {
        background: var(--primary);
        color: #fff;
      }

      .lost-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .lost-toggle input {
        width: 15px;
        height: 15px;
        margin: 0;
      }

      .lost-exp-score {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f6f8fd;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
        padding: 4px 3px;
      }

      .lost-guide-row {
        display: grid;
        grid-template-columns: 46px 60px minmax(116px, 1fr) 36px 56px;
        gap: 3px;
        align-items: center;
        margin-bottom: 2px;
      }

      .lost-guide {
        font-size: 10px;
        font-weight: 700;
        color: var(--muted);
        text-align: center;
        line-height: 1.1;
      }

      .harm-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 4px;
      }

      .harm-divider {
        height: 1px;
        background: color-mix(in srgb, var(--line) 90%, transparent);
        margin: 2px 0;
      }

      .harm-col {
        display: grid;
        gap: 4px;
        align-content: start;
      }

      .harm-row {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 4px;
        align-items: center;
      }

      .harm-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-align: center;
        border-radius: 8px;
        border: 1px solid transparent;
        padding: 2px 4px;
      }

      .harm-label.mountain {
        color: #5d646e;
        background: #eceff3;
        border-color: #c8ced8;
      }

      .harm-label.tree {
        color: #2f7a2f;
        background: #e5f5e5;
        border-color: #b7dfb7;
      }

      .harm-label.field {
        color: #8a6400;
        background: #fff3b8;
        border-color: #f4d35f;
      }

      .harm-label.river {
        color: #0f6071;
        background: #d9f4f8;
        border-color: #81d2dd;
      }

      .harm-label.building {
        color: #a9172e;
        background: #ffd8dd;
        border-color: #ff9aaa;
      }

      .harm-label.animal {
        color: #1f6fa5;
        background: #e8f5ff;
        border-color: #b9ddf5;
      }

      .harm-row input {
        padding: 3px 4px;
        font-size: 16px;
      }

      .cent-grid {
        display: grid;
        gap: 4px;
        --cent-label-w: 84px;
      }

      .cent-row {
        display: grid;
        grid-template-columns: var(--cent-label-w) repeat(3, minmax(0, 1fr));
        gap: 6px;
        align-items: center;
      }

      .cent-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-align: center;
        white-space: nowrap;
      }

      .cent-grid input {
        height: 26px;
        padding: 3px 4px;
      }

      .cent-empty {
        visibility: hidden;
      }

      .harm-sub-chip {
        font-size: 12px;
        border-radius: 999px;
        padding: 4px 8px;
        font-weight: 700;
        color: var(--muted);
        background: color-mix(in srgb, var(--card) 88%, var(--chip) 12%);
        border: 1px solid var(--line);
        white-space: nowrap;
      }

      .inline-bonus-icon {
        font-size: 16px;
        color: var(--muted);
        font-weight: 700;
        white-space: nowrap;
        line-height: 1;
      }

      .inline-bonus-input {
        width: 52px;
        min-width: 52px;
        height: 26px;
        padding: 3px 4px;
        font-size: 16px;
        border-radius: 12px;
      }

      .round-block + .round-block {
        margin-top: 14px;
      }

      .round-title {
        margin: 0;
        font-size: 16px;
        flex: 0 0 auto;
      }

      .round-head {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .round-meta {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        margin: 0;
        overflow-x: auto;
        white-space: nowrap;
      }

      .round-result-chip {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 700;
        background: var(--p-bg, #f4f7ff);
        border-color: var(--p-border, var(--line));
        color: var(--p-text, #3352a7);
      }

      .crown-slot {
        display: inline-block;
        width: 1.1em;
        text-align: center;
        line-height: 1;
        font-size: 12px;
      }

      .crown-slot.hidden {
        visibility: hidden;
      }

      .round-result-chip.win {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      }

      .round-result-chip.lose {
        opacity: 0.72;
      }

      .player-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .player-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px;
        background: #fff;
      }

      .player-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .player-name {
        font-size: 13px;
        font-weight: 800;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--p-border, var(--line));
        background: var(--p-bg, #f4f7ff);
        color: var(--p-strong, var(--text));
        line-height: 1;
      }

      .player-head-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .round-total-chip {
        font-size: 14px;
        background: var(--p-strong, #1d3f95);
        border-radius: 99px;
        padding: 5px 10px;
        font-weight: 800;
        color: var(--p-strong-text, #ffffff);
      }

      .player-theme-1 {
        --p-bg: #ffecee;
        --p-border: #ffb9c0;
        --p-text: #9e1f2f;
        --p-strong: #c52a3d;
        --p-strong-text: #ffffff;
      }

      .player-theme-2 {
        --p-bg: #e9f2ff;
        --p-border: #b9d3ff;
        --p-text: #1f56a8;
        --p-strong: #1f56a8;
        --p-strong-text: #ffffff;
      }

      .player-theme-3 {
        --p-bg: #fff4e7;
        --p-border: #ffd7a8;
        --p-text: #9a5a00;
        --p-strong: #b96b00;
        --p-strong-text: #ffffff;
      }

      .player-theme-4 {
        --p-bg: #f4ecff;
        --p-border: #d5c0ff;
        --p-text: #6941a3;
        --p-strong: #6941a3;
        --p-strong-text: #ffffff;
      }

      .score-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 8px;
      }

      .score-grid input {
        padding: 5px 3px;
        font-size: 16px;
      }

      /* CastleCombo only: keep 16px text, compress vertical spacing */
      #pageCastle .round-block + .round-block {
        margin-top: 10px;
      }

      #pageCastle .player-grid {
        gap: 7px;
      }

      #pageCastle .player-card {
        padding: 8px;
      }

      #pageCastle .player-header {
        margin-bottom: 6px;
      }

      #pageCastle .score-grid {
        gap: 4px;
        margin-bottom: 6px;
      }

      #pageCastle .score-grid input {
        padding: 3px 2px;
        font-size: 16px;
      }

      @media (min-width: 680px) {
        body {
          padding: 18px;
        }

        .controls {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 420px) {
        .controls {
          row-gap: 4px;
          column-gap: 5px;
        }

        .lost-row {
          grid-template-columns: 40px 52px minmax(96px, 1fr) 30px 50px;
        }

        .lost-guide-row {
          grid-template-columns: 40px 52px minmax(96px, 1fr) 30px 50px;
        }

        .harm-row {
          grid-template-columns: 44px 1fr;
          gap: 4px;
        }

        .harm-grid {
          gap: 3px;
        }

        .cent-row {
          --cent-label-w: 76px;
          grid-template-columns: var(--cent-label-w) repeat(3, minmax(0, 1fr));
          gap: 4px;
        }
      }

      /* Tablet (iPad) optimization */
      @media (min-width: 768px) and (max-width: 1199px) {
        body {
          padding: 12px;
        }

        .wrap {
          max-width: 1024px;
        }

        .panel {
          padding: 10px;
        }

        .player-grid {
          gap: 8px;
        }

        .round-meta {
          gap: 7px;
        }

        .lost-row {
          grid-template-columns: 46px 62px minmax(124px, 1fr) 36px 60px;
        }

        .lost-guide-row {
          grid-template-columns: 46px 62px minmax(124px, 1fr) 36px 60px;
        }
      }

      @media (min-width: 1200px) {
        body {
          padding: 20px;
        }

        .wrap {
          max-width: 1320px;
        }

        .panel {
          padding: 12px;
          margin-bottom: 10px;
        }

        .controls {
          gap: 8px;
          padding: 6px;
        }

        .controls select,
        .controls button {
          height: 36px;
          font-size: 13px;
        }

        .round-meta {
          gap: 8px;
        }

        .player-grid {
          gap: 10px;
        }
      }

      @media (min-width: 1600px) {
        .wrap {
          max-width: 1480px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="panel game-tabs">
        <button id="tabCastle" type="button" class="tab-btn active">
          캐슬콤보
        </button>
        <button id="tabLostCity" type="button" class="tab-btn">
          로스트시티
        </button>
        <button id="tabHarmonies" type="button" class="tab-btn">
          하모니즈
        </button>
        <button id="tabCentury" type="button" class="tab-btn">
          센추리:골렘
        </button>
      </section>

      <section id="pageCastle" class="game-page active">
        <section class="panel controls">
          <div class="field">
            <select id="playerCount">
              <option value="2" selected>2인</option>
              <option value="3">3인</option>
              <option value="4">4인</option>
            </select>
          </div>
          <div class="field">
            <select id="roundCount">
              <option value="1" selected>1라운드</option>
              <option value="2">2라운드</option>
              <option value="3">3라운드</option>
            </select>
          </div>
          <div class="field">
            <button id="resetBtn" type="button" class="btn-danger">
              전체 점수 초기화
            </button>
          </div>
        </section>

        <section id="roundContainer"></section>
      </section>

      <section id="pageLostCity" class="game-page">
        <section class="panel controls">
          <div class="field">
            <select id="lostPlayerCount">
              <option value="2" selected>2인</option>
              <option value="3">3인</option>
              <option value="4">4인</option>
            </select>
          </div>
          <div class="field">
            <select id="lostRoundCount">
              <option value="1" selected>1라운드</option>
              <option value="2">2라운드</option>
              <option value="3">3라운드</option>
            </select>
          </div>
          <div class="field">
            <button id="lostResetBtn" type="button" class="btn-danger">
              전체 점수 초기화
            </button>
          </div>
        </section>

        <section id="lostRoundContainer"></section>
      </section>

      <section id="pageHarmonies" class="game-page">
        <section class="panel controls">
          <div class="field">
            <select id="harmPlayerCount">
              <option value="1">1인</option>
              <option value="2" selected>2인</option>
              <option value="3">3인</option>
              <option value="4">4인</option>
            </select>
          </div>
          <div class="field">
            <select id="harmRoundCount">
              <option value="1" selected>1라운드</option>
              <option value="2">2라운드</option>
              <option value="3">3라운드</option>
            </select>
          </div>
          <div class="field">
            <button id="harmResetBtn" type="button" class="btn-danger">
              전체 점수 초기화
            </button>
          </div>
        </section>

        <section id="harmRoundContainer"></section>
      </section>

      <section id="pageCentury" class="game-page">
        <section class="panel controls">
          <div class="field">
            <select id="centPlayerCount">
              <option value="2" selected>2인</option>
              <option value="3">3인</option>
              <option value="4">4인</option>
            </select>
          </div>
          <div class="field">
            <select id="centRoundCount">
              <option value="1" selected>1라운드</option>
              <option value="2">2라운드</option>
              <option value="3">3라운드</option>
            </select>
          </div>
          <div class="field">
            <button id="centResetBtn" type="button" class="btn-danger">
              전체 점수 초기화
            </button>
          </div>
        </section>

        <section id="centRoundContainer"></section>
      </section>
    </div>

    <script>
      const state = {
        players: 2,
        rounds: 1,
        lostPlayers: 2,
        lostRounds: 1,
        harmPlayers: 2,
        harmRounds: 1,
        centPlayers: 2,
        centRounds: 1,
      };

      const STORAGE_KEYS = {
        castle: "board-score-castle-v1",
        lost: "board-score-lost-v1",
        harmonies: "board-score-harmonies-v1",
        century: "board-score-century-v1",
        ui: "board-score-ui-v1",
      };

      const playerCountEl = document.getElementById("playerCount");
      const roundCountEl = document.getElementById("roundCount");
      const resetBtn = document.getElementById("resetBtn");
      const roundContainerEl = document.getElementById("roundContainer");
      const tabCastleEl = document.getElementById("tabCastle");
      const tabLostCityEl = document.getElementById("tabLostCity");
      const tabHarmoniesEl = document.getElementById("tabHarmonies");
      const tabCenturyEl = document.getElementById("tabCentury");
      const pageCastleEl = document.getElementById("pageCastle");
      const pageLostCityEl = document.getElementById("pageLostCity");
      const pageHarmoniesEl = document.getElementById("pageHarmonies");
      const pageCenturyEl = document.getElementById("pageCentury");
      const lostPlayerCountEl = document.getElementById("lostPlayerCount");
      const lostRoundCountEl = document.getElementById("lostRoundCount");
      const lostResetBtnEl = document.getElementById("lostResetBtn");
      const lostRoundContainerEl =
        document.getElementById("lostRoundContainer");
      const harmPlayerCountEl = document.getElementById("harmPlayerCount");
      const harmRoundCountEl = document.getElementById("harmRoundCount");
      const harmResetBtnEl = document.getElementById("harmResetBtn");
      const harmRoundContainerEl =
        document.getElementById("harmRoundContainer");
      const centPlayerCountEl = document.getElementById("centPlayerCount");
      const centRoundCountEl = document.getElementById("centRoundCount");
      const centResetBtnEl = document.getElementById("centResetBtn");
      const centRoundContainerEl =
        document.getElementById("centRoundContainer");

      const GAME_DEFS = {
        castle: {
          statePlayersKey: "players",
          stateRoundsKey: "rounds",
          storageKey: STORAGE_KEYS.castle,
          pageEl: pageCastleEl,
          playerCountEl,
          roundCountEl,
          roundContainerEl,
          valueSelector: 'input[type="number"]',
        },
        lostcity: {
          statePlayersKey: "lostPlayers",
          stateRoundsKey: "lostRounds",
          storageKey: STORAGE_KEYS.lost,
          pageEl: pageLostCityEl,
          playerCountEl: lostPlayerCountEl,
          roundCountEl: lostRoundCountEl,
          roundContainerEl: lostRoundContainerEl,
          valueSelector:
            'input[type="number"], input[type="hidden"], input[type="checkbox"]',
        },
        harmonies: {
          statePlayersKey: "harmPlayers",
          stateRoundsKey: "harmRounds",
          storageKey: STORAGE_KEYS.harmonies,
          pageEl: pageHarmoniesEl,
          playerCountEl: harmPlayerCountEl,
          roundCountEl: harmRoundCountEl,
          roundContainerEl: harmRoundContainerEl,
          valueSelector: 'input[type="number"]',
        },
        century: {
          statePlayersKey: "centPlayers",
          stateRoundsKey: "centRounds",
          storageKey: STORAGE_KEYS.century,
          pageEl: pageCenturyEl,
          playerCountEl: centPlayerCountEl,
          roundCountEl: centRoundCountEl,
          roundContainerEl: centRoundContainerEl,
          valueSelector: 'input[type="number"]',
        },
      };

      function loadStorageByKey(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (_) {
          return null;
        }
      }

      function saveStorageByKey(key, payload) {
        try {
          localStorage.setItem(key, JSON.stringify(payload));
        } catch (_) {
          // Ignore storage failures on restricted environments.
        }
      }

      function collectValues(rootEl, selector) {
        const values = {};
        rootEl.querySelectorAll(selector).forEach((el) => {
          if (!el.id) return;
          if (el.type === "checkbox") {
            values[el.id] = Boolean(el.checked);
          } else {
            values[el.id] = el.value;
          }
        });
        return values;
      }

      function applyValues(values) {
        if (!values) return;
        Object.entries(values).forEach(([id, value]) => {
          const el = document.getElementById(id);
          if (!el) return;
          if (el.type === "checkbox") {
            el.checked = Boolean(value);
          } else {
            el.value = String(value);
          }
        });
      }

      function persistGame(gameKey) {
        const game = GAME_DEFS[gameKey];
        if (!game) return;
        saveStorageByKey(game.storageKey, {
          settings: {
            players: state[game.statePlayersKey],
            rounds: state[game.stateRoundsKey],
          },
          values: collectValues(game.roundContainerEl, game.valueSelector),
        });
      }

      const storedByGame = {};
      Object.keys(GAME_DEFS).forEach((gameKey) => {
        const game = GAME_DEFS[gameKey];
        storedByGame[gameKey] = loadStorageByKey(game.storageKey);
      });
      const storedUI = loadStorageByKey(STORAGE_KEYS.ui);

      Object.entries(GAME_DEFS).forEach(([gameKey, game]) => {
        const stored = storedByGame[gameKey];
        if (stored?.settings) {
          state[game.statePlayersKey] = Number(stored.settings.players) || 2;
          state[game.stateRoundsKey] = Number(stored.settings.rounds) || 1;
        }
        game.playerCountEl.value = String(state[game.statePlayersKey]);
        game.roundCountEl.value = String(state[game.stateRoundsKey]);
      });

      function toScore(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return 0;
        return Math.floor(n);
      }

      function normalizeInputNumber(
        inputEl,
        { min = -Infinity, max = Infinity } = {},
      ) {
        const value = Math.min(max, Math.max(min, toScore(inputEl.value)));
        inputEl.value = String(value);
        return value;
      }

      function getNormalizedValueById(id, options) {
        return normalizeInputNumber(document.getElementById(id), options);
      }

      function sumNormalizedRange(start, end, idBuilder, options) {
        let total = 0;
        for (let i = start; i <= end; i++) {
          total += getNormalizedValueById(idBuilder(i), options);
        }
        return total;
      }

      function setTextById(id, text) {
        const el = document.getElementById(id);
        if (el) el.textContent = text;
      }

      function createNumberInput({
        id,
        min,
        max,
        onInput,
        className,
        placeholder,
      }) {
        const input = document.createElement("input");
        input.type = "number";
        input.id = id;
        input.step = "1";
        if (min !== undefined) input.min = String(min);
        if (max !== undefined) input.max = String(max);
        if (className) input.className = className;
        if (placeholder) input.placeholder = placeholder;
        input.value = "0";
        input.inputMode = "numeric";
        bindSelectAll(input);
        if (onInput) input.addEventListener("input", onInput);
        return input;
      }

      function makeGridInput(round, player, cell) {
        return createNumberInput({
          id: `cell-r${round}-p${player}-c${cell}`,
          onInput: recalculate,
        });
      }

      function makeKeyInput(round, player) {
        return createNumberInput({
          id: `key-r${round}-p${player}`,
          min: 0,
          onInput: recalculate,
        });
      }

      const LOST_EXPEDITIONS = [
        { key: "z1", label: "1구역" },
        { key: "z2", label: "2구역" },
        { key: "z3", label: "3구역" },
        { key: "z4", label: "4구역" },
        { key: "z5", label: "5구역" },
      ];

      function makeLostInput(id, min, max) {
        return createNumberInput({
          id,
          min,
          max,
          onInput: recalculateLost,
        });
      }

      function makeLostWagerButtons(id) {
        const wrap = document.createElement("div");
        wrap.className = "lost-wager-group";

        [0, 1, 2, 3].forEach((n) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `lost-wager-btn${n === 0 ? " active" : ""}`;
          btn.dataset.value = String(n);
          btn.textContent = String(n);
          btn.addEventListener("click", () => {
            setLostWagerValue(id, n);
          });
          wrap.appendChild(btn);
        });

        const hidden = document.createElement("input");
        hidden.type = "hidden";
        hidden.id = id;
        hidden.value = "0";
        wrap.appendChild(hidden);

        return wrap;
      }

      function syncLostWagerButtons(id) {
        const hidden = document.getElementById(id);
        if (!hidden) return;
        const value = normalizeInputNumber(hidden, { min: 0, max: 3 });
        const wrap = hidden.parentElement;
        if (!wrap) return;
        const buttons = wrap.querySelectorAll(".lost-wager-btn");
        buttons.forEach((btn) => {
          btn.classList.toggle("active", toScore(btn.dataset.value) === value);
        });
      }

      function setLostWagerValue(id, value) {
        const hidden = document.getElementById(id);
        if (!hidden) return;
        hidden.value = String(value);
        syncLostWagerButtons(id);
        recalculateLost();
      }

      function makeLostBonusToggle(id) {
        const wrap = document.createElement("label");
        wrap.className = "lost-toggle";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = id;
        checkbox.addEventListener("change", recalculateLost);

        wrap.appendChild(checkbox);
        return wrap;
      }

      function bindSelectAll(input) {
        const selectAll = () => {
          if (typeof input.select === "function") {
            input.select();
          }
        };

        input.addEventListener("focus", () => {
          requestAnimationFrame(selectAll);
        });

        input.addEventListener("mouseup", (event) => {
          event.preventDefault();
          selectAll();
        });
      }

      function getResponsiveMaxColumns() {
        const width = window.innerWidth || document.documentElement.clientWidth;
        if (width >= 1400) return 4;
        if (width >= 768) return 2;
        return 1;
      }

      function applyResponsiveGridColumns(gridEl, playerCount) {
        const cols = Math.min(playerCount, getResponsiveMaxColumns());
        gridEl.style.gridTemplateColumns = `repeat(${Math.max(1, cols)}, minmax(0, 1fr))`;
      }

      function createRoundShell(round, metaId, playerCount) {
        const roundPanel = document.createElement("section");
        roundPanel.className = "panel round-block";

        const roundHead = document.createElement("div");
        roundHead.className = "round-head";

        const title = document.createElement("h2");
        title.className = "round-title";
        title.textContent = `${round}R`;
        roundHead.appendChild(title);

        const roundMeta = document.createElement("div");
        roundMeta.className = "round-meta";
        roundMeta.id = metaId;
        roundHead.appendChild(roundMeta);
        roundPanel.appendChild(roundHead);

        const playerGrid = document.createElement("div");
        playerGrid.className = "player-grid";
        applyResponsiveGridColumns(playerGrid, playerCount);

        return { roundPanel, playerGrid };

      function createPlayerCardShell(player) {
        const card = document.createElement("article");

        header.appendChild(name);
        header.appendChild(headRight);
        card.appendChild(header);

        return { card, headRight };
      }

      function syncAllLostWagerButtons() {
        document
          .querySelectorAll('#pageLostCity input[type="hidden"][id^="lost-w-"]')

      function buildUI() {
        const prevValues = collectValues(
          roundContainerEl,

        );
        roundContainerEl.innerHTML = "";

        for (let r = 1; r <= state.rounds; r++) {
          const { roundPanel, playerGrid } = createRoundShell(
            r,
            `round-meta-r${r}`,

          );

          for (let p = 1; p <= state.players; p++) {
            const { card, headRight } = createPlayerCardShell(p);

            const keyLabel = document.createElement("span");
            keyLabel.className = "inline-bonus-icon";
            keyLabel.textContent = "🔑";

            keyInput.classList.add("inline-bonus-input");

            const roundTotal = document.createElement("div");
            roundTotal.className = `round-total-chip player-theme-${p}`;
            roundTotal.id = `round-total-r${r}-p${p}`;
            roundTotal.textContent = "합계 0점";

            headRight.appendChild(keyLabel);
            headRight.appendChild(keyInput);
            headRight.appendChild(roundTotal);

            const scoreGrid = document.createElement("div");
            scoreGrid.className = "score-grid";
            for (let c = 1; c <= 9; c++) {
              scoreGrid.appendChild(makeGridInput(r, p, c));
            }
            card.appendChild(scoreGrid);

            playerGrid.appendChild(card);
          }

          roundPanel.appendChild(playerGrid);
          roundContainerEl.appendChild(roundPanel);
        }

        applyValues(prevValues);
        recalculateGame("castle");
      }

      function computeCastleRoundScore(r, p) {
        const roundCard = sumNormalizedRange(
          1,
          9,
          (c) => `cell-r${r}-p${p}-c${c}`,
        );
        const roundKey = getNormalizedValueById(`key-r${r}-p${p}`, { min: 0 });
        const roundFinal = roundCard + roundKey;
        setTextById(`round-total-r${r}-p${p}`, `합계 ${roundFinal}점`);
        return roundFinal;
      }

      function computeHarmoniesRoundScore(r, p) {
        const landscapeTotal = sumNormalizedRange(
          0,
          HARM_LANDSCAPES.length - 1,
          (idx) => `harm-land-r${r}-p${p}-c${idx}`,
          { min: 0 },
        );
        const animalTotal = sumNormalizedRange(
          1,
          HARM_ANIMAL_INPUTS,
          (a) => `harm-animal-r${r}-p${p}-a${a}`,
          { min: 0 },
        );
        const total = landscapeTotal + animalTotal;
        setTextById(`harm-land-sub-r${r}-p${p}`, `풍경 ${landscapeTotal}`);
        setTextById(`harm-animal-sub-r${r}-p${p}`, `동물 ${animalTotal}`);
        setTextById(`harm-total-r${r}-p${p}`, `합계 ${total}점`);
        return total;
      }

      function computeCenturyRoundScore(r, p) {
        const cardTotal = sumNormalizedRange(
          1,
          6,
          (i) => `cent-card-r${r}-p${p}-i${i}`,
          { min: 0 },
        );
        const gold = getNormalizedValueById(`cent-gold-r${r}-p${p}`, {
          min: 0,
        });
        const silver = getNormalizedValueById(`cent-silver-r${r}-p${p}`, {
          min: 0,
        });
        const gem = getNormalizedValueById(`cent-gem-r${r}-p${p}`, { min: 0 });
        const bonusTotal = gold * 3 + silver + gem;
        const total = cardTotal + bonusTotal;
        setTextById(`cent-card-sub-r${r}-p${p}`, `카드 ${cardTotal}`);
        setTextById(`cent-bonus-sub-r${r}-p${p}`, `보너스 ${bonusTotal}`);
        setTextById(`cent-total-r${r}-p${p}`, `합계 ${total}점`);
        return total;
      }

      function computeLostRoundScore(r, p) {
        let total = 0;
        const bonus = getNormalizedValueById(`lost-bonus-r${r}-p${p}`, {
          min: 0,
        });

        LOST_EXPEDITIONS.forEach((_, idx) => {
          const sumId = `lost-sum-r${r}-p${p}-e${idx}`;
          const wagerId = `lost-w-r${r}-p${p}-e${idx}`;
          const bonusEl = document.getElementById(`lost-b-r${r}-p${p}-e${idx}`);
          const expScoreEl = document.getElementById(
            `lost-exp-score-r${r}-p${p}-e${idx}`,
          );

          const sum = getNormalizedValueById(sumId, { min: 0 });
          const wager = getNormalizedValueById(wagerId, { min: 0, max: 3 });
          const hasBonus = Boolean(bonusEl.checked);

          let expeditionScore = 0;
          if (sum > 0 || wager > 0 || hasBonus) {
            expeditionScore = (sum - 20) * (wager + 1);
            if (hasBonus) {
              expeditionScore += 20;
            }
          }

          expScoreEl.textContent = String(expeditionScore);
          total += expeditionScore;
        });

        total += bonus;
        setTextById(`lost-total-r${r}-p${p}`, `합계 ${total}점`);
        return total;
      }

      const GAME_RECALC_DEFS = {
        castle: {
          getRoundCount: () => state.rounds,
          getPlayerCount: () => state.players,
          metaPrefix: "round-meta-r",
          computeScore: computeCastleRoundScore,
        },
        harmonies: {
          getRoundCount: () => state.harmRounds,
          getPlayerCount: () => state.harmPlayers,
          metaPrefix: "harm-round-meta-r",
          computeScore: computeHarmoniesRoundScore,
        },
        century: {
          getRoundCount: () => state.centRounds,
          getPlayerCount: () => state.centPlayers,
          metaPrefix: "cent-round-meta-r",
          computeScore: computeCenturyRoundScore,
        },
        lostcity: {
          getRoundCount: () => state.lostRounds,
          getPlayerCount: () => state.lostPlayers,
          metaPrefix: "lost-round-meta-r",
          computeScore: computeLostRoundScore,
        },
      };

      function recalculateByGameDef(gameKey) {
        const def = GAME_RECALC_DEFS[gameKey];
        const roundScores = collectRoundScores(
          def.getRoundCount(),
          def.getPlayerCount(),
          def.computeScore,
        );
        finalizeRecalculation(roundScores, def.metaPrefix, gameKey);
      }

      function recalculate() {
        recalculateByGameDef("castle");
      }

      function renderRoundResults(roundScores, metaPrefix) {
        roundScores.forEach(({ round, entries }) => {
          const metaEl = document.getElementById(`${metaPrefix}${round}`);
          metaEl.innerHTML = "";

          const maxScore = Math.max(...entries.map((entry) => entry.score));

          entries.forEach((entry) => {
            const chip = document.createElement("span");
            const isWin = entry.score === maxScore;
            chip.className = `round-result-chip player-theme-${entry.player} ${isWin ? "win" : "lose"}`;

            const scoreText = document.createElement("span");
            scoreText.textContent = `${entry.player}P ${entry.score}점`;

            const crown = document.createElement("span");
            crown.className = `crown-slot${isWin ? "" : " hidden"}`;
            crown.textContent = "👑";

            chip.appendChild(scoreText);
            chip.appendChild(crown);
            metaEl.appendChild(chip);
          });
        });
      }

      function collectRoundScores(roundCount, playerCount, scoreByPlayer) {
        const roundScores = [];
        for (let r = 1; r <= roundCount; r++) {
          const entries = [];
          for (let p = 1; p <= playerCount; p++) {
            entries.push({ player: p, score: scoreByPlayer(r, p) });
          }
          roundScores.push({ round: r, entries });
        }
        return roundScores;
      }

      function finalizeRecalculation(roundScores, metaPrefix, gameKey) {
        renderRoundResults(roundScores, metaPrefix);
        persistGame(gameKey);
      }

            playerGrid.appendChild(card);
          }

          roundPanel.appendChild(playerGrid);
          centRoundContainerEl.appendChild(roundPanel);
        }

        applyValues(prevValues);
        recalculateGame("century");
      }

      function recalculateCentury() {
        recalculateByGameDef("century");
      }

      function buildLostUI() {
        const prevValues = collectValues(
          lostRoundContainerEl,
          'input[type="number"], input[type="hidden"], input[type="checkbox"]',
        );
        lostRoundContainerEl.innerHTML = "";

        for (let r = 1; r <= state.lostRounds; r++) {
          const { roundPanel, playerGrid } = createRoundShell(
            r,
            `lost-round-meta-r${r}`,
            state.lostPlayers,
          );

          for (let p = 1; p <= state.lostPlayers; p++) {
            const { card, headRight } = createPlayerCardShell(p);

            const bonusLabel = document.createElement("span");
            bonusLabel.className = "inline-bonus-icon";
            bonusLabel.textContent = "🃏";
            const bonusInput = makeLostInput(
              `lost-bonus-r${r}-p${p}`,
              0,
              undefined,
            );
            bonusInput.classList.add("inline-bonus-input");

            const roundTotal = document.createElement("div");
            roundTotal.className = `round-total-chip player-theme-${p}`;
            roundTotal.id = `lost-total-r${r}-p${p}`;
            roundTotal.textContent = "합계 0점";

            headRight.appendChild(bonusLabel);
            headRight.appendChild(bonusInput);
            headRight.appendChild(roundTotal);

            const grid = document.createElement("div");
            grid.className = "lost-grid";

            const guideRow = document.createElement("div");
            guideRow.className = "lost-guide-row";

            const g0 = document.createElement("div");
            g0.className = "lost-guide";
            g0.textContent = "";
            const g1 = document.createElement("div");
            g1.className = "lost-guide";
            g1.textContent = "점수합";
            const g2 = document.createElement("div");
            g2.className = "lost-guide";
            g2.textContent = "x2투자";
            const g3 = document.createElement("div");
            g3.className = "lost-guide";
            g3.textContent = "8장+";
            const g4 = document.createElement("div");
            g4.className = "lost-guide";
            g4.textContent = "구역합";

            guideRow.appendChild(g0);
            guideRow.appendChild(g1);
            guideRow.appendChild(g2);
            guideRow.appendChild(g3);
            guideRow.appendChild(g4);
            grid.appendChild(guideRow);

            LOST_EXPEDITIONS.forEach((exp, idx) => {
              const row = document.createElement("div");
              row.className = "lost-row";

              const label = document.createElement("div");
              label.className = "lost-label";
              label.textContent = exp.label;

              const sumInput = makeLostInput(
                `lost-sum-r${r}-p${p}-e${idx}`,
                0,
                undefined,
              );
              sumInput.classList.add("lost-sum-input");
              sumInput.placeholder = "숫자합";

              const wagerInput = makeLostWagerButtons(
                `lost-w-r${r}-p${p}-e${idx}`,
              );
              const bonusToggle = makeLostBonusToggle(
                `lost-b-r${r}-p${p}-e${idx}`,
              );

              const expScore = document.createElement("div");
              expScore.className = "lost-exp-score";
              expScore.id = `lost-exp-score-r${r}-p${p}-e${idx}`;
              expScore.textContent = "0";

              row.appendChild(label);
              row.appendChild(sumInput);
              row.appendChild(wagerInput);
              row.appendChild(bonusToggle);
              row.appendChild(expScore);
              grid.appendChild(row);
            });

            card.appendChild(grid);
            playerGrid.appendChild(card);
          }

          roundPanel.appendChild(playerGrid);
          lostRoundContainerEl.appendChild(roundPanel);
        }

        applyValues(prevValues);
        syncAllLostWagerButtons();
        recalculateGame("lostcity");
      }

      function recalculateLost() {
        recalculateByGameDef("lostcity");
      }

      const GAME_RUNTIME = {
        castle: {
          build: buildUI,
          recalc: recalculate,
          tabEl: tabCastleEl,
          resetSelector: 'input[type="number"]',
        },
        lostcity: {
          build: buildLostUI,
          recalc: recalculateLost,
          tabEl: tabLostCityEl,
          resetSelector:
            'input[type="number"], input[type="hidden"], input[type="checkbox"]',
          resetExtra: syncAllLostWagerButtons,
          afterRestore: syncAllLostWagerButtons,
        },
        harmonies: {
          build: buildHarmoniesUI,
          recalc: recalculateHarmonies,
          tabEl: tabHarmoniesEl,
          resetSelector: 'input[type="number"]',
        },
        century: {
          build: buildCenturyUI,
          recalc: recalculateCentury,
          tabEl: tabCenturyEl,
          resetSelector: 'input[type="number"]',
        },
      };

      function buildGameUI(gameKey) {
        GAME_RUNTIME[gameKey].build();
      }

      function recalculateGame(gameKey) {
        GAME_RUNTIME[gameKey].recalc();
      }

      function resetGame(gameKey) {
        const game = GAME_DEFS[gameKey];
        const runtime = GAME_RUNTIME[gameKey];
        game.roundContainerEl
          .querySelectorAll(runtime.resetSelector || 'input[type="number"]')
          .forEach((el) => {
            if (el.type === "checkbox") {
              el.checked = false;
            } else {
              el.value = "0";
            }
          });
        runtime.resetExtra?.();
        recalculateGame(gameKey);
      }

      function bindGameControls(gameKey, resetButtonEl) {
        const game = GAME_DEFS[gameKey];
        game.playerCountEl.addEventListener("change", () => {
          state[game.statePlayersKey] = Number(game.playerCountEl.value) || 2;
          buildGameUI(gameKey);
        });
        game.roundCountEl.addEventListener("change", () => {
          state[game.stateRoundsKey] = Number(game.roundCountEl.value) || 1;
          buildGameUI(gameKey);
        });
        resetButtonEl.addEventListener("click", () => {
          resetGame(gameKey);
        });
      }

      bindGameControls("castle", resetBtn);
      bindGameControls("lostcity", lostResetBtnEl);
      bindGameControls("harmonies", harmResetBtnEl);
      bindGameControls("century", centResetBtnEl);

      function setActiveGame(gameKey) {
        Object.entries(GAME_RUNTIME).forEach(([key, runtime]) => {
          const isActive = key === gameKey;
          runtime.tabEl.classList.toggle("active", isActive);
          GAME_DEFS[key].pageEl.classList.toggle("active", isActive);
          document.body.classList.toggle(
            `theme-${key === "lostcity" ? "lost" : key}`,
            isActive,
          );
        });
        saveStorageByKey(STORAGE_KEYS.ui, { activeGame: gameKey });
      }

      Object.entries(GAME_RUNTIME).forEach(([key, runtime]) => {
        runtime.tabEl.addEventListener("click", () => {
          setActiveGame(key);
        });
      });

      window.addEventListener("resize", () => {
        Object.entries(GAME_DEFS).forEach(([key, game]) => {
          game.pageEl.querySelectorAll(".player-grid").forEach((grid) => {
            applyResponsiveGridColumns(grid, state[game.statePlayersKey]);
          });
          GAME_RUNTIME[key].afterRestore?.();
        });
      });

      const initialGame =
        storedUI?.activeGame === "lostcity" ||
        storedUI?.activeGame === "harmonies" ||
        storedUI?.activeGame === "century"
          ? storedUI.activeGame
          : "castle";
      setActiveGame(initialGame);
      Object.keys(GAME_RUNTIME).forEach((gameKey) => buildGameUI(gameKey));

      const hasStoredValues = Object.values(storedByGame).some((v) =>
        Boolean(v),
      );
      if (hasStoredValues) {
        Object.entries(storedByGame).forEach(([gameKey, stored]) => {
          applyValues(stored?.values);
          GAME_RUNTIME[gameKey].afterRestore?.();
          recalculateGame(gameKey);
        });
      }
    </script>
  </body>
</html>
